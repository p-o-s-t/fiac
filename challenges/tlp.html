<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLP Classification - FIAC Challenge</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .challenge-box {
            background: var(--dark-grey);
            padding: 25px;
            border: 1px solid var(--lavender-medium);
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            text-align: left;
        }
        .scenario-text {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 15px;
            background: var(--black);
            border-left: 4px solid var(--lavender-medium);
            min-height: 100px;
        }
        .tlp-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .tlp-btn {
            padding: 12px 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            text-align: center;
            transition: opacity 0.2s;
        }
        .tlp-btn.red { background: #ff5252; color: white; }
        .tlp-btn.amber-strict { background: #ffab40; color: black; border: 2px solid #000; }
        .tlp-btn.amber { background: #ffab40; color: black; }
        .tlp-btn.green { background: #69f0ae; color: black; }
        .tlp-btn.clear { background: #f5f5f5; color: black; }
        .tlp-btn:hover { opacity: 0.8; }
        .tlp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .feedback.correct { background: rgba(76, 175, 80, 0.2); border: 1px solid #4caf50; color: #a5d6a7; }
        .feedback.incorrect { background: rgba(244, 67, 54, 0.2); border: 1px solid #f44336; color: #ef9a9a; }
        
        .progress-indicator {
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--light-grey);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>FIAC: TLP Classification</h1>
                <nav>
                    <a href="../index.html" class="nav-link">&larr; Back to Dashboard</a>
                </nav>
            </div>
        </header>

        <main class="slide-container">
            <div class="challenge-box">
                <div class="progress-indicator" id="progressIndicator">Scenario 1 of 4</div>
                <h2>Scenario: Classify the Information</h2>
                <span class="ksa-tag">DCWF Alignment: KSA 3154</span>
                <div id="scenario" class="scenario-text"></div>
                
                <p style="margin-bottom: 15px;">Which TLP 2.0 classification should be applied to this information?</p>

                <div class="tlp-options">
                    <button class="tlp-btn red" onclick="checkTLP('RED')">TLP:RED</button>
                    <button class="tlp-btn amber-strict" onclick="checkTLP('AMBER+STRICT')">TLP:AMBER+STRICT</button>
                    <button class="tlp-btn amber" onclick="checkTLP('AMBER')">TLP:AMBER</button>
                    <button class="tlp-btn green" onclick="checkTLP('GREEN')">TLP:GREEN</button>
                    <button class="tlp-btn clear" onclick="checkTLP('CLEAR')">TLP:CLEAR</button>
                </div>

                <div id="feedbackBox" class="feedback"></div>
                
                <div id="nextArea" style="margin-top: 20px; display: none; text-align: right;">
                    <button class="btn" onclick="nextScenario()">Next Scenario &rarr;</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 TLP Classification - FIAC Challenge | <a href="../index.html" style="color: var(--lavender-medium); text-decoration: none;">&larr; Back to Dashboard</a></p>
        </footer>
    </div>

    <script src="../assets/js/progress.js"></script>
    <script>
        const scenarios = [
            {
                text: "You have received a report containing highly sensitive details about a zero-day vulnerability currently being used to target your company's proprietary internal software. The report explicitly states: 'For the eyes of the primary recipients only. No further dissemination is permitted.'",
                correct: "RED",
                explanation: "TLP:RED is used when information is restricted to the specific individuals who received it and cannot be shared further."
            },
            {
                text: "A partner organization shares a list of malicious IP addresses observed in a recent campaign. They state that the information can be shared within your organization, but <strong>not</strong> with your external clients or constituents.",
                correct: "AMBER+STRICT",
                explanation: "TLP:AMBER+STRICT restricts sharing to the organization only, excluding its clients."
            },
            {
                text: "An industry ISAC shares a bulletin about a new phishing lure seen across the financial sector. The instructions state the information is for the use of the sector but should not be released to the general public.",
                correct: "GREEN",
                explanation: "TLP:GREEN is for sharing within a community or sector, but not publicly."
            },
            {
                text: "You find a blog post from a reputable security firm detailing a recent malware analysis. The information is published on their public website for anyone to read.",
                correct: "CLEAR",
                explanation: "TLP:CLEAR is for information that carries minimal risk and can be shared without restriction."
            }
        ];

        let currentScenarioIndex = 0;

        function displayScenario() {
            const scenario = scenarios[currentScenarioIndex];
            document.getElementById('scenario').innerHTML = scenario.text;
            document.getElementById('progressIndicator').innerText = `Scenario ${currentScenarioIndex + 1} of ${scenarios.length}`;
            document.getElementById('feedbackBox').style.display = 'none';
            document.getElementById('nextArea').style.display = 'none';
            
            const buttons = document.querySelectorAll('.tlp-btn');
            buttons.forEach(btn => btn.disabled = false);
        }

        function checkTLP(selected) {
            const scenario = scenarios[currentScenarioIndex];
            const feedbackBox = document.getElementById('feedbackBox');
            
            feedbackBox.style.display = 'block';
            if (selected === scenario.correct) {
                feedbackBox.className = "feedback correct";
                feedbackBox.innerHTML = `<strong>Correct!</strong> ${scenario.explanation}`;
                
                const buttons = document.querySelectorAll('.tlp-btn');
                buttons.forEach(btn => btn.disabled = true);
                
                document.getElementById('nextArea').style.display = 'block';
                
                if (currentScenarioIndex === scenarios.length - 1) {
                    document.querySelector('#nextArea button').innerText = "Finish Challenge";
                }
            } else {
                feedbackBox.className = "feedback incorrect";
                feedbackBox.innerHTML = `<strong>Incorrect.</strong> Try again! Hint: Look at the scope of who can receive the information.`;
            }
        }

        function nextScenario() {
            currentScenarioIndex++;
            if (currentScenarioIndex < scenarios.length) {
                displayScenario();
            } else {
                if (typeof markCompleted === 'function') {
                    markCompleted('tlp');
                }
                location.href = '../index.html';
            }
        }

        // Initialize first scenario
        displayScenario();
    </script>
</body>
</html>
